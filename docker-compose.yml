services:
  postgres:
    image: postgres:16
    container_name: olist_postgres
    environment:
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
    ports:
      - "5432:5432"
    volumes:
      - olist_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olist -d olist_analytics"]
      interval: 2s
      timeout: 5s
      retries: 30

  app:
    build: .
    container_name: olist_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: olist_analytics
      DB_USER: olist
      DB_PASSWORD: olist
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./sql:/app/sql
      - ./scripts:/app/scripts

volumes:
  olist_pgdata:
